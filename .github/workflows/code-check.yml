name: Check Code

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Backend lint
        shell: bash
        run: |
          test -z "$(gofmt -l .)"
          go vet ./...

      - name: Frontend lint
        working-directory: web
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        working-directory: web
        run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Backend tests
        run: go test ./...

      - name: Frontend tests
        working-directory: web
        run: pnpm test

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Backend test coverage
        run: |
          node --test scripts/go-coverage-threshold.test.mjs
          go test \
            ./internal/auth \
            ./internal/db \
            ./internal/event \
            ./internal/http \
            ./internal/middleware \
            ./internal/permission \
            ./internal/shortlink \
            ./internal/system \
            ./internal/user \
            -coverprofile="$GITHUB_WORKSPACE/coverage.out"
          node scripts/go-coverage-threshold.mjs "$GITHUB_WORKSPACE/coverage.out" 100 --include-from=scripts/go-coverage-targets.txt --exclude-blocks-from=scripts/go-coverage-excluded-blocks.txt

      - name: Frontend test coverage
        working-directory: web
        run: pnpm test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: web/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Frontend build
        working-directory: web
        run: pnpm build

      - name: Docker build
        run: docker build .
