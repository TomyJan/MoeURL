services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: moeurl
      POSTGRES_USER: moeurl
      POSTGRES_PASSWORD: moeurl
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moeurl -d moeurl"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MOEURL_ENV: production
      MOEURL_HTTP_ADDR: :8080
      MOEURL_STATIC_DIR: /app/web
      MOEURL_DATABASE_URL: postgres://moeurl:moeurl@postgres:5432/moeurl?sslmode=disable
    ports:
      - "8080:8080"

volumes:
  postgres-data:
